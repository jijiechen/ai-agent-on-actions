          REACTION_ID=$(GH_TOKEN=$GITHUB_TOKEN gh api "repos/$GITHUB_REPOSITORY/issues/comments/$EVENT_COMMENT_ID/reactions" --jq '.[] | select(.content=="eyes") | .id' 2>/dev/null)
          # 删除 eyes 反应
