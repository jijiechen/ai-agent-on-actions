name: AI Agent

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  workflow_call:
    inputs:
      llm_api_base_url:
        description: 'LLM API 基准地址'
        type: string
        required: false
        default: 'https://api.deepseek.com'
      llm_model_generic:
        description: '用于常规任务和需求整理的模型名称'
        type: string
        required: false
        default: 'deepseek-v4-flash'
      llm_model_expert:
        description: '用于开发和测试任务的模型名称'
        type: string
        required: false
        default: 'deepseek-v4-flash'
    secrets:
      LLM_API_KEY:
        description: '调用大语言模型的 API Key'
        required: true

concurrency:
  group: ai-agent-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  MAIN_BRANCH: main
  COPILOT_HOME: /tmp/copilot-home
  COPILOT_PROVIDER_TYPE: openai
  COPILOT_PROVIDER_WIRE_API: completions

jobs:
  run-agent:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'issues' && github.event.label.name == 'ai-agent')
      ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/ai-agent '))
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COPILOT_PROVIDER_BASE_URL: "${{ inputs.llm_api_base_url || vars.LLM_API_BASE_URL || 'https://api.deepseek.com' }}"
      COPILOT_MODEL: ${{ inputs.llm_model_expert || vars.LLM_MODEL_EXPERT || 'deepseek-v4-flash' }}
      EVENT_NAME: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request && 'pull_request_comment' || github.event_name }}
      EVENT_OBJECT_NUMBER: ${{ github.event.issue.number }}
      EVENT_COMMENT_BODY: >
        ${{
          github.event_name == 'issue_comment'
          && toJson(github.event.comment.body)
          || toJson(github.event.issue.body)
        }}
      EVENT_COMMENT_AUTHOR: >
        ${{
          github.event_name == 'issue_comment'
          && github.event.comment.user.login
          || github.event.issue.user.login
        }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Generic Agent
        id: generic-agent
        env: 
          COPILOT_PROVIDER_API_KEY: "${{ secrets.LLM_API_KEY }}"
          COPILOT_MODEL: ${{ inputs.llm_model_generic || vars.LLM_MODEL_GENERIC || 'deepseek-v4-flash' }}
        run: |
          mkdir -p /tmp/copilot/prompts
          cat > /tmp/copilot/prompts/generic.md << 'PROMPT_EOF'
          # 基础知识与指令
          
          请注意，你当前运行在 CI Pipeline 中，不要向用户询问问题，如果确有不清楚的信息，请停止工作。你可以随意使用当前环境里一切可用的命令，但不要执行会破坏基础操作系统稳定性的命令。
          
          ## 立即读取基础信息
          
          你要了解当前你的 Issue 或 PR 上下文，请读取下列环境变量：
          * 环境变量 `GITHUB_REPOSITORY`：GitHub 仓库全名，格式为 `owner/repo`，用于 gh CLI 操作
          * 环境变量 `EVENT_NAME`：当前是哪种事件触发了本次任务，可能的值有：`issue_comment`, `pull_request_comment`, `label`
          * 环境变量 `EVENT_OBJECT_NUMBER`：对应的 Issue 号或是 PR 号
          * 环境变量 `EVENT_COMMENT_ID`：触发本次运行的评论的数据库 ID（仅 `issue_comment` 或 `pull_request_comment` 事件时有效，`label` 事件时为空字符串）
          * 环境变量 `EVENT_COMMENT_BODY` ：触发本次运行的用户评论内容
          * 环境变量 `EVENT_COMMENT_AUTHOR` 触发本次运行的用户名称，你写回复时记得 @ 他。
          
          在调用 GitHub 平台 API 时，请使用 `gh` 命令。其凭据在环境变量 `GITHUB_TOKEN` 里，你不要直接读取这个环境变量的值，但你可以写命令把它 export 给你要执行的 shell 使用。
          
          你所有与用户的沟通都应该使用中文，包括回复 issue、写 PR 标题、打 commit 等。
          
          ## GitHub Reactions（表情反馈指示）
          
          GitHub Reactions（表情反馈指示）可以让用户能直观了解你的工作状态，在执行过程中你必须通过 GitHub Reactions 来表明进度。这些操作不应影响你的主要工作流程；如果 gh CLI 因认证问题无法执行反应操作，应跳过反应操作并继续专注于完成主要任务，不要因此阻塞工作。
          
          ### 1. 添加 `eyes` 👀 反应
          
          `eyes` 👀 反应表示你已经收到任务了，并正在处理。
          
          对于 `issue_comment` 或 `pull_request_comment` 事件（`EVENT_COMMENT_ID` 非空），在触发事件的评论上添加反应：
          
          ```sh
          GH_TOKEN=$GITHUB_TOKEN gh api "repos/$GITHUB_REPOSITORY/issues/comments/$EVENT_COMMENT_ID/reactions" -f content=eyes --silent 2>/dev/null || true
          ```
          
          对于 `label` 事件（`EVENT_COMMENT_ID` 为空）：在 Issue 本身的第一条评论上（issue body）添加 `eyes` 反应：
          
          ```sh
          GH_TOKEN=$GITHUB_TOKEN gh api "repos/$GITHUB_REPOSITORY/issues/$EVENT_OBJECT_NUMBER/reactions" -f content=eyes --silent 2>/dev/null || true
          ```
          
          ### 2. 移除 `eyes` 👀 反应
          
          移除 `eyes` 表示任务结束。
          
          对于 `issue_comment` 或 `pull_request_comment` 事件，从触发事件的评论上移除反应：
          
          ```sh
          # 获取当前 reactions 中 content 为 eyes 的 reaction_id
          REACTION_ID=$(GH_TOKEN=$GITHUB_TOKEN gh api "repos/$GITHUB_REPOSITORY/issues/comments/$EVENT_COMMENT_ID/reactions" --jq '.[] | select(.content=="eyes") | .id' 2>/dev/null)
          # 删除 eyes 反应
          if [ -n "$REACTION_ID" ]; then
            GH_TOKEN=$GITHUB_TOKEN gh api "repos/$GITHUB_REPOSITORY/issues/comments/$EVENT_COMMENT_ID/reactions/$REACTION_ID" -X DELETE --silent 2>/dev/null || true
          fi
          ```
          
          对于 `label` 事件（`EVENT_COMMENT_ID` 为空），从 Issue 本身的第一条评论上（即 issue body）移除 `eyes`
          
          ```sh
          # 获取当前 reactions 中 content 为 eyes 的 reaction_id
          REACTION_ID=$(GH_TOKEN=$GITHUB_TOKEN gh api "repos/$GITHUB_REPOSITORY/issues/$EVENT_OBJECT_NUMBER/reactions" --jq '.[] | select(.content=="eyes") | .id' 2>/dev/null)
          # 删除 eyes 反应
          if [ -n "$REACTION_ID" ]; then
            GH_TOKEN=$GITHUB_TOKEN gh api "repos/$GITHUB_REPOSITORY/issues/$EVENT_OBJECT_NUMBER/reactions/$REACTION_ID" -X DELETE --silent 2>/dev/null || true
          fi
          ```
          
          ### 3. 添加 `rocket` 🚀 反应
          
          `rocket` 🚀 反应表示回答完毕、任务执行完成等，添加它之前移除 `eyes`。
          
          对于 `issue_comment` 或 `pull_request_comment` 事件，在触发事件的评论上添加反应：
          
          ```sh
          GH_TOKEN=$GITHUB_TOKEN gh api "repos/$GITHUB_REPOSITORY/issues/comments/$EVENT_COMMENT_ID/reactions" -f content=rocket --silent 2>/dev/null || true
          ```
          
          对于 `label` 事件，在 Issue 本身的第一条评论上（issue body）添加 `rocket` 反应：
          
          ```sh
          GH_TOKEN=$GITHUB_TOKEN gh api "repos/$GITHUB_REPOSITORY/issues/$EVENT_OBJECT_NUMBER/reactions" -f content=rocket --silent 2>/dev/null || true
          ```
          
          ### 4. 添加 `confused` 😕 反应
          
          `confused` 😕 反应表示遇到问题，添加它之前移除 `eyes`。
          
          如果在工作过程中遇到了无法解决的技术问题、不清晰的方案选择，或信息不足导致无法继续时，移除 `eyes` 反应并添加 `confused` 反应。
          
          对于 `issue_comment` 或 `pull_request_comment` 事件，在触发事件的评论上添加反应：
          
          ```sh
          GH_TOKEN=$GITHUB_TOKEN gh api "repos/$GITHUB_REPOSITORY/issues/comments/$EVENT_COMMENT_ID/reactions" -f content=confused --silent 2>/dev/null || true
          ```
          
          对于 `label` 事件，在 Issue 本身的第一条评论上（issue body）添加 `confused` 反应：
          
          ```sh
          GH_TOKEN=$GITHUB_TOKEN gh api "repos/$GITHUB_REPOSITORY/issues/$EVENT_OBJECT_NUMBER/reactions" -f content=confused --silent 2>/dev/null || true
          ```
          
          ---
          
          # 通用 Agent 的 CI 工作流程
          
          按照以下步骤开始你的工作：
          
          ## 1. 工作分类
          
          1. 读取用户从 GitHub 的 issue 或 PR 的评论或回复，判断当前这次任务的类型，并在文件 `/tmp/copilot/task-kind.txt` 里输出任务类型。如果 issue 的评论内容只有 `/ai-agent` 而没有其他字样，这表示希望你创建 PR 来实现需求或优化现有已关联的 PR，也就是 dev 类型任务；如果是 issue 或 PR 的 label 事件，也是 dev 类型任务，其他的，请按下面的方式来判断：
             1. issue 文字整理工作或需求重写。输出任务类型为 issue_refinement。
             2. 涉及到需要修改仓库代码的工作，输出任务类型为 dev。包括要实现功能或自动化测试，修改 CI 或仓库里文档都属于这一类。
             3. 涉及到要验证产品的某项产品功能，输出类型为 test。
             4. 日常杂务，输出任务类型为 generic。包括询问仓库统计，GitHub 项目管理，以及普通日常对话闲聊等各种其他类型的工作。
          2. 无论是哪项工作，都请在原始 issue 或 PR 上打上 GitHub Reactions（表情反馈指示）
          3. 如果是日常杂务 generic 类工作，你就自己完成它；其他类型的工作就直接跳过，不要执行任何操作，后面我会有其他程序负责执行的
          
          ## 2. 准备开始
          
          **为所有类型的工作都添加 `eyes` 👀 反应**
          
          你的任务包括向将所有类型的任务添加开始的 `eyes` 反应。请按照上文的基础知识部分中的说明完成添加。
          
          ## 3. 执行工作
          
          如果是日常杂务 generic 类工作，你就自己完成它；其他类型的工作你直接跳过，不要执行任何操作，后面我会有其他程序负责执行。
          
          再次强调，你只执行 generic 类工作。
          
          ## 4. 工作结束
          
          如果是日常杂务 generic 类工作，是你自己做的，在结束时额外执行以下步骤：
          1. 所有步骤完成后，把你的工作结果、结论更新到 issue 或 PR 上作为一条新的评论。请使用中文输出、写 PR 标题和评论。
          2. 根据任务结果、结论，按照上文的基础知识部分中的说明完成添加对评论或 PR/Issue 的反应：如何任务正常完成，移除 `eyes`，不要添加任何其他反应。
          
          PROMPT_EOF

          mkdir -p "${COPILOT_HOME}"
          copilot -C "${{ github.workspace }}"             --allow-all             --no-ask-user             --mode autopilot             --no-auto-update             -p "$(cat /tmp/copilot/prompts/generic.md)"
          
          if [[ -f "/tmp/copilot/task-kind.txt" ]]; then
            AGENT_TASK_KIND=$(cat /tmp/copilot/task-kind.txt)
            echo "AGENT_TASK_KIND=$AGENT_TASK_KIND" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Issue Organizer
        id: issue-organizer-agent
        if: contains(steps.generic-agent.outputs.AGENT_TASK_KIND, 'issue_refinement')
        env: 
          COPILOT_PROVIDER_API_KEY: "${{ secrets.LLM_API_KEY }}"
          COPILOT_MODEL: ${{ inputs.llm_model_generic || vars.LLM_MODEL_GENERIC || 'deepseek-v4-flash' }}
        run: |
          mkdir -p /tmp/copilot/prompts
          cat > /tmp/copilot/prompts/issue-organizer.md << 'PROMPT_EOF'
          # 基础知识与指令
          
          请注意，你当前运行在 CI Pipeline 中，不要向用户询问问题，如果确有不清楚的信息，请停止工作。你可以随意使用当前环境里一切可用的命令，但不要执行会破坏基础操作系统稳定性的命令。
          
