name: AI Agent

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

concurrency:
  group: ai-agent-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  MAIN_BRANCH: main

jobs:
  run-agent:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'issues' && github.event.label.name == 'ai-agent')
      ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/ai-agent'))
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COPILOT_HOME:                 /tmp/copilot-home
      COPILOT_PROVIDER_BASE_URL:    "${{ vars.LLM_API_BASE_URL || 'https://api.deepseek.com' }}"
      COPILOT_PROVIDER_TYPE:        openai
      COPILOT_PROVIDER_WIRE_API:    completions
      COPILOT_MODEL:                ${{ vars.LLM_MODEL_EXPERT || 'deepseek-v4-flash' }}
      EVENT_NAME: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request && 'pull_request_comment' || github.event_name }}
      EVENT_OBJECT_NUMBER:  ${{ github.event.issue.number }}
      EVENT_COMMENT_BODY: >
        ${{
          github.event_name == 'issue_comment'
          && toJson(github.event.comment.body)
          || toJson(github.event.issue.body)
        }}
      EVENT_COMMENT_AUTHOR: >
        ${{
          github.event_name == 'issue_comment'
          && github.event.comment.user.login
          || github.event.issue.user.login
        }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Generic Agent
        id: generic-agent
        env: 
          COPILOT_PROVIDER_API_KEY:     "${{ secrets.LLM_API_KEY }}"
          COPILOT_MODEL:                ${{ vars.LLM_MODEL_GENERIC || 'deepseek-v4-flash' }}
        run: |
          mkdir -p "${COPILOT_HOME}"

          copilot -C "${{ github.workspace }}" \
            --allow-all \
            --no-ask-user \
            --mode autopilot \
            --no-auto-update \
            -p "$(cat ${{ github.workspace }}/.agents/prompts/generic-on-ci.md)"
          
          if [[ -f "/tmp/copilot/task-kind.txt" ]]; then
            AGENT_TASK_KIND=$(cat /tmp/copilot/task-kind.txt)
            echo "AGENT_TASK_KIND=$AGENT_TASK_KIND" >> $GITHUB_OUTPUT
          fi

      - name: Run Issue Organizer
        id: issue-organizer-agent
        if: contains(steps.generic-agent.outputs.AGENT_TASK_KIND, 'issue_refinement')
        env: 
          COPILOT_PROVIDER_API_KEY:     "${{ secrets.LLM_API_KEY }}"
          COPILOT_MODEL:                ${{ vars.LLM_MODEL_GENERIC || 'deepseek-v4-flash' }}
        run: |
          mkdir -p "${COPILOT_HOME}"

          copilot -C "${{ github.workspace }}" \
            --allow-all \
            --no-ask-user \
            --mode autopilot \
            --no-auto-update \
            --agent issue-organizer \
            -p "$(cat ${{ github.workspace }}/.agents/prompts/issue-organizer-on-ci.md)"

      - name: Run Dev agent
        id: dev-agent
        if: contains(steps.generic-agent.outputs.AGENT_TASK_KIND, 'dev')
        env: 
          COPILOT_PROVIDER_API_KEY:     "${{ secrets.LLM_API_KEY }}"
          COPILOT_MODEL:                ${{ vars.LLM_MODEL_EXPERT || 'deepseek-v4-flash' }}
        run: |
          mkdir -p "${COPILOT_HOME}"

          copilot -C "${{ github.workspace }}" \
            --allow-all \
            --no-ask-user \
            --mode autopilot \
            --no-auto-update \
            --agent dev \
            -p "$(cat ${{ github.workspace }}/.agents/prompts/dev-on-ci.md)"

      - name: Run Test agent
        id: tester-agent
        if: contains(steps.generic-agent.outputs.AGENT_TASK_KIND, 'test')
        env: 
          COPILOT_PROVIDER_API_KEY:     "${{ secrets.LLM_API_KEY }}"
          COPILOT_MODEL:                ${{ vars.LLM_MODEL_EXPERT || 'deepseek-v4-flash' }}
        run: |
          mkdir -p "${COPILOT_HOME}"

          copilot -C "${{ github.workspace }}" \
            --allow-all \
            --no-ask-user \
            --mode autopilot \
            --no-auto-update \
            --agent tester \
            -p "$(cat ${{ github.workspace }}/.agents/prompts/tester-on-ci.md)"
