# 示例：AI Agent 自动路由 Workflow（推荐）
#
# 将此文件复制到你的仓库的 .github/workflows/ 目录下即可启用 AI Agent。
# AI Agent 会自动识别任务类型（开发/测试/需求整理），并分派到对应的专业 Agent 执行。

name: AI Agent（自动路由）

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  run-ai-agent:
    # 仅当 Issue 被打上 "ai-agent" 标签，或评论以 "/ai-agent " 开头时触发
    if: >
      (github.event_name == 'issues' && github.event.label.name == 'ai-agent')
      ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/ai-agent '))

    uses: jijiechen/ai-agent-on-actions/.github/workflows/ai-agent.yml@main
    permissions:
      contents: write
      issues: write
      pull-requests: write
    secrets:
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
    # 可选：自定义 LLM 配置
    # with:
    #   llm_api_base_url: ${{ vars.LLM_API_BASE_URL }}
    #   llm_model_generic: ${{ vars.LLM_MODEL_GENERIC }}
    #   llm_model_expert: ${{ vars.LLM_MODEL_EXPERT }}
